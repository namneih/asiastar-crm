<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Asia-Star CRM</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;min-height:100vh;display:flex;flex-direction:column;max-width:480px;margin:0 auto}

.header{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:12px 14px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.header h1{color:#fff;font-size:16px;font-weight:700}
.header p{color:#8fa8c8;font-size:11px;margin-top:1px}

.stats{display:flex;gap:6px;padding:8px 10px;background:#fff;border-bottom:1px solid #e8ecf0;overflow-x:auto}
.stat{background:#f8f9fb;border-radius:8px;padding:5px 10px;text-align:center;min-width:62px;flex-shrink:0;cursor:pointer;border:1.5px solid transparent;transition:.15s}
.stat.active{border-color:#2563eb;background:#eff6ff}
.stat-num{font-size:16px;font-weight:700;color:#1a1a2e}
.stat-label{font-size:9px;color:#888;margin-top:1px;white-space:nowrap}
.stat.green .stat-num{color:#16a34a}
.stat.orange .stat-num{color:#ea580c}
.stat.blue .stat-num{color:#2563eb}
.stat.red .stat-num{color:#dc2626}
.stat.purple .stat-num{color:#7c3aed}

.filters{background:#fff;padding:8px 10px;border-bottom:1px solid #e8ecf0;display:flex;flex-direction:column;gap:6px}
.frow{display:flex;gap:6px}
select,input[type=text]{height:34px;border:1.5px solid #dde1e7;border-radius:8px;padding:0 9px;font-size:12px;color:#1a1a2e;background:#fff;outline:none;flex:1;min-width:0}
select:focus,input:focus{border-color:#2563eb}
.btn{height:34px;border-radius:8px;border:none;padding:0 12px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0}
.btn-blue{background:#2563eb;color:#fff}
.btn-green{background:#16a34a;color:#fff}
.btn-gray{background:#f1f3f5;color:#555;border:1px solid #dde1e7}
.btn-red{background:#dc2626;color:#fff}

.list{flex:1;padding:8px 10px;overflow-y:auto}

.card{background:#fff;border-radius:10px;margin-bottom:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.card-top{display:flex;align-items:flex-start;gap:8px;padding:10px 12px 6px}
.hang-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;white-space:nowrap;flex-shrink:0;margin-top:2px}
.card-info{flex:1;min-width:0}
.card-name{font-size:13px;font-weight:600;color:#1a1a2e;line-height:1.3}
.card-addr{font-size:11px;color:#6b7280;margin-top:2px;line-height:1.4}
.chips{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.chip{font-size:10px;padding:2px 7px;border-radius:20px;background:#f1f5f9;color:#475569}
.chip.tinh{background:#eff6ff;color:#1d4ed8}
.chip.huyen{background:#f0fdf4;color:#166534}

.card-actions{display:flex;align-items:center;justify-content:space-between;padding:6px 12px 8px;gap:8px}
.sdt-area{display:flex;align-items:center;gap:6px;flex:1}
.call-btn{display:flex;align-items:center;gap:4px;background:#dcfce7;color:#166534;border:none;border-radius:8px;padding:5px 10px;font-size:12px;font-weight:600;cursor:pointer;text-decoration:none;white-space:nowrap}
.call-btn:hover{background:#bbf7d0}
.no-sdt-area{display:flex;align-items:center;gap:4px}
.no-sdt{font-size:11px;color:#9ca3af;font-style:italic}
.edit-sdt-btn{font-size:10px;background:#fef3c7;color:#92400e;border:1px solid #fde68a;border-radius:6px;padding:3px 7px;cursor:pointer}

.status-btn{padding:4px 8px;border-radius:6px;font-size:11px;font-weight:500;border:none;cursor:pointer;transition:.1s}
.status-select{height:28px;border-radius:6px;border:1.5px solid #dde1e7;font-size:11px;padding:0 4px;color:#374151;background:#fff;cursor:pointer;max-width:140px}
.status-select:focus{border-color:#7c3aed;outline:none}

.card-note{padding:0 12px 8px}
.note-input{width:100%;height:28px;border:1px solid #e5e7eb;border-radius:6px;padding:0 8px;font-size:11px;color:#374151;resize:none}
.note-input:focus{outline:none;border-color:#7c3aed}

.status-bar{display:flex;align-items:center;gap:6px;padding:4px 12px 8px;border-top:1px solid #f3f4f6;margin-top:-2px}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.status-text{font-size:11px;color:#6b7280;flex:1}

/* Status colors */
.s-chuagoi{background:#e5e7eb;color:#374151}
.s-khongnhe{background:#fee2e2;color:#dc2626}
.s-khonglh{background:#fef3c7;color:#b45309}
.s-guibaogia{background:#dbeafe;color:#1d4ed8}
.s-hengap{background:#ede9fe;color:#6d28d9}
.s-danhdau{background:#d1fae5;color:#065f46}
.s-khongtt{background:#f3f4f6;color:#9ca3af}
.dot-chuagoi{background:#9ca3af}
.dot-khongnhe{background:#dc2626}
.dot-khonglh{background:#f59e0b}
.dot-guibaogia{background:#3b82f6}
.dot-hengap{background:#7c3aed}
.dot-danhdau{background:#10b981}
.dot-khongtt{background:#d1d5db}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#fff;border-radius:16px 16px 0 0;padding:16px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:700;color:#1a1a2e;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid #f3f4f6}
.form-field{margin-bottom:10px}
.form-field label{font-size:11px;font-weight:600;color:#6b7280;display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px}
.form-field input,.form-field select,.form-field textarea{width:100%;border:1.5px solid #dde1e7;border-radius:8px;padding:8px 10px;font-size:13px;color:#1a1a2e;background:#fff;outline:none}
.form-field input:focus,.form-field select:focus,.form-field textarea:focus{border-color:#2563eb}
.form-field textarea{height:60px;resize:none}
.modal-actions{display:flex;gap:8px;margin-top:14px;padding-top:12px;border-top:1px solid #f3f4f6}
.modal-actions .btn{flex:1;height:40px;font-size:13px}

.empty{text-align:center;padding:40px 20px;color:#9ca3af}
.empty-icon{font-size:36px;margin-bottom:8px}

mark{background:#fef08a;border-radius:2px;padding:0 1px}

.fab{position:fixed;bottom:16px;right:16px;display:flex;flex-direction:column;gap:8px;z-index:200}
.fab-btn{height:42px;border-radius:21px;border:none;padding:0 16px;font-size:12px;font-weight:600;cursor:pointer;box-shadow:0 3px 10px rgba(0,0,0,.2);display:flex;align-items:center;gap:6px}

.section-header{background:#f8f9fb;padding:6px 12px;font-size:10px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.5px;border-radius:6px;margin-bottom:6px}
</style>
</head>
<body>

<div class="header">
  <h1>⭐ Asia-Star NPP CRM</h1>
  <p id="h-sub">Đang tải...</p>
</div>

<div class="stats" id="stats-bar">
  <div class="stat blue" onclick="filterByStatus('')" id="st-all"><div class="stat-num" id="sn-all">0</div><div class="stat-label">Tất cả</div></div>
  <div class="stat" onclick="filterByStatus('chuagoi')" id="st-chuagoi"><div class="stat-num" id="sn-chuagoi">0</div><div class="stat-label">Chưa gọi</div></div>
  <div class="stat red" onclick="filterByStatus('khongnhe')" id="st-khongnhe"><div class="stat-num" id="sn-khongnhe">0</div><div class="stat-label">Không nghe</div></div>
  <div class="stat orange" onclick="filterByStatus('khonglh')" id="st-khonglh"><div class="stat-num" id="sn-khonglh">0</div><div class="stat-label">Không LH</div></div>
  <div class="stat blue" onclick="filterByStatus('guibaogia')" id="st-guibaogia"><div class="stat-num" id="sn-guibaogia">0</div><div class="stat-label">Gửi BG</div></div>
  <div class="stat purple" onclick="filterByStatus('hengap')" id="st-hengap"><div class="stat-num" id="sn-hengap">0</div><div class="stat-label">Hẹn gặp</div></div>
  <div class="stat green" onclick="filterByStatus('danhdau')" id="st-danhdau"><div class="stat-num" id="sn-danhdau">0</div><div class="stat-label">Tiềm năng</div></div>
</div>

<div class="filters">
  <div class="frow">
    <input type="text" id="search" placeholder="🔍 Tìm tên, SĐT, địa chỉ..." oninput="applyFilters()">
  </div>
  <div class="frow">
    <select id="f-tinh" onchange="updateHuyen();applyFilters()">
      <option value="">📍 Tất cả tỉnh</option>
    </select>
    <select id="f-huyen" onchange="applyFilters()">
      <option value="">🏘 Tất cả huyện</option>
    </select>
  </div>
  <div class="frow">
    <select id="f-hang" onchange="applyFilters()">
      <option value="">🏷 Tất cả hãng</option>
    </select>
    <select id="f-sdt" onchange="applyFilters()">
      <option value="">📞 Tất cả</option>
      <option value="co">Có SĐT</option>
      <option value="khong">Chưa có SĐT</option>
    </select>
    <button class="btn btn-gray" onclick="resetFilters()">↺</button>
    <button class="btn btn-blue" onclick="showExport()">📥</button>
  </div>
</div>

<div class="list" id="list"></div>

<!-- Modal thêm mới -->
<div class="modal-bg" id="add-modal" style="display:none" onclick="if(event.target===this)closeAdd()">
  <div class="modal">
    <h3>➕ Thêm khách hàng mới</h3>
    <div class="form-field"><label>Tên công ty / cửa hàng *</label><input id="a-ten" placeholder="VD: Cửa hàng VLXD Minh Hùng"></div>
    <div class="form-field"><label>Số điện thoại</label><input id="a-sdt" type="tel" placeholder="0912345678"></div>
    <div class="form-field"><label>Địa chỉ</label><input id="a-dc" placeholder="Số nhà, đường, xã..."></div>
    <div class="form-field"><label>Tỉnh / Thành phố</label><select id="a-tinh"><option value="">-- Chọn tỉnh --</option></select></div>
    <div class="form-field"><label>Huyện / Quận</label><input id="a-huyen" placeholder="VD: H. Hoài Đức"></div>
    <div class="form-field"><label>Hãng gạch đang bán</label><input id="a-hang" placeholder="VD: TASA, VITTO..."></div>
    <div class="form-field"><label>Ghi chú ban đầu</label><textarea id="a-note" placeholder="Gặp tại hội chợ, do anh X giới thiệu..."></textarea></div>
    <div class="modal-actions">
      <button class="btn btn-green" onclick="addContact()">✓ Thêm</button>
      <button class="btn btn-gray" onclick="closeAdd()">Huỷ</button>
    </div>
  </div>
</div>

<!-- Modal sửa SĐT / ghi chú -->
<div class="modal-bg" id="edit-modal" style="display:none" onclick="if(event.target===this)closeEdit()">
  <div class="modal">
    <h3 id="edit-title">✏️ Cập nhật thông tin</h3>
    <div class="form-field"><label>Số điện thoại</label><input id="e-sdt" type="tel" placeholder="0912345678"></div>
    <div class="form-field"><label>Huyện / Quận</label><input id="e-huyen" placeholder="VD: H. Hoài Đức"></div>
    <div class="form-field"><label>Trạng thái liên hệ</label>
      <select id="e-status">
        <option value="chuagoi">⚪ Chưa gọi</option>
        <option value="khongnhe">🔴 Không nghe máy</option>
        <option value="khonglh">🟠 Không liên lạc được</option>
        <option value="guibaogia">🔵 Đã gửi báo giá</option>
        <option value="hengap">🟣 Đã hẹn gặp</option>
        <option value="danhdau">🟢 Tiềm năng / Quan tâm</option>
        <option value="khongtt">⚫ Không tiếp tục</option>
      </select>
    </div>
    <div class="form-field"><label>Ghi chú</label><textarea id="e-note" placeholder="Gọi ngày ..., khách nói ..., cần follow up ..."></textarea></div>
    <div class="modal-actions">
      <button class="btn btn-blue" onclick="saveEdit()">💾 Lưu</button>
      <button class="btn btn-gray" onclick="closeEdit()">Huỷ</button>
    </div>
  </div>
</div>

<div class="fab">
  <button class="fab-btn" style="background:#2563eb;color:#fff" onclick="showAdd()">➕ Thêm mới</button>
</div>

      const savedIds = new Set(s.map(r=>r._id));
      const newFromRaw = raw.filter((_,i)=>!savedIds.has('raw_'+i)).map((_,i)=>({
        ...raw[i],_id:'raw_'+i,status:'chuagoi',note:raw[i].note||'',_new:false
      }));
      // Chỉ thêm nếu có NPP thực sự mới
      DATA = [...s, ...newFromRaw.filter(r=>!s.find(x=>x.ten===r.ten&&x.tinh===r.tinh))];
    } catch(e){
      DATA = initFromRaw(raw);
    }
  } else {
    DATA = initFromRaw(raw);
  }
}

function initFromRaw(raw){
  return raw.map((r,i)=>({
    ...r, _id:'raw_'+i, status:'chuagoi', note:r.note||'', _new:false
  }));
}

function saveData(){
  localStorage.setItem(STORE_KEY, JSON.stringify(DATA));
}

// ── STATE ────────────────────────────────────────────────────────────────────
let filtered = [];
let activeStatus = '';
let editId = null;

// ── TINH/HUYEN MAP ───────────────────────────────────────────────────────────
const TINH_HUYEN = {};
function buildMaps(){
  DATA.forEach(r=>{
    if(!r.tinh)return;
    if(!TINH_HUYEN[r.tinh])TINH_HUYEN[r.tinh]=new Set();
    if(r.huyen)TINH_HUYEN[r.tinh].add(r.huyen);
  });
  const ft=document.getElementById('f-tinh');
  const at=document.getElementById('a-tinh');
  ft.innerHTML='<option value="">📍 Tất cả tỉnh</option>';
  at.innerHTML='<option value="">-- Chọn tỉnh --</option>';
  Object.keys(TINH_HUYEN).sort().forEach(t=>{
    ft.innerHTML+=`<option>${t}</option>`;
    at.innerHTML+=`<option>${t}</option>`;
  });
  const fh=document.getElementById('f-hang');
  fh.innerHTML='<option value="">🏷 Tất cả hãng</option>';
  [...new Set(DATA.map(r=>r.hang).filter(Boolean))].sort()
    .forEach(h=>fh.innerHTML+=`<option>${h}</option>`);
}

function updateHuyen(){
  const t=document.getElementById('f-tinh').value;
  const fh=document.getElementById('f-huyen');
  fh.innerHTML='<option value="">🏘 Tất cả huyện</option>';
  if(t&&TINH_HUYEN[t]){
    [...TINH_HUYEN[t]].sort().forEach(h=>fh.innerHTML+=`<option>${h}</option>`);
  }
}

// ── FILTERS ───────────────────────────────────────────────────────────────────
function filterByStatus(s){
  activeStatus = (activeStatus===s&&s!=='')?'':s;
  applyFilters();
}

function applyFilters(){
  const q=document.getElementById('search').value.toLowerCase().trim();
  const tinh=document.getElementById('f-tinh').value;
  const huyen=document.getElementById('f-huyen').value;
  const hang=document.getElementById('f-hang').value;
  const sdt=document.getElementById('f-sdt').value;

  filtered=DATA.filter(r=>{
    if(activeStatus&&(r.status||'chuagoi')!==activeStatus)return false;
    if(tinh&&r.tinh!==tinh)return false;
    if(huyen&&r.huyen!==huyen)return false;
    if(hang&&r.hang!==hang)return false;
    if(sdt==='co'&&(!r.sdt||r.sdt.length<9))return false;
    if(sdt==='khong'&&r.sdt&&r.sdt.length>=9)return false;
    if(q){
      const hay=(r.ten+r.dia_chi+r.tinh+r.huyen+r.hang+r.sdt+r.note).toLowerCase();
      if(!hay.includes(q))return false;
    }
    return true;
  });
  renderList(q);
  updateStats();
}

function resetFilters(){
  document.getElementById('search').value='';
  ['f-tinh','f-huyen','f-hang','f-sdt'].forEach(id=>document.getElementById(id).value='');
  activeStatus='';
  updateHuyen();
  applyFilters();
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function hl(txt,q){
  if(!q||!txt)return txt||'';
  return txt.replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),m=>`<mark>${m}</mark>`);
}

function renderList(q=''){
  const el=document.getElementById('list');
  if(!filtered.length){
    el.innerHTML='<div class="empty"><div class="empty-icon">📭</div><div>Không tìm thấy kết quả</div></div>';
    return;
  }
  let html='';
  filtered.forEach(r=>{
    const hc=HANG_CLR[r.hang]||{bg:'#eee',tx:'#333'};
    const st=STATUS_CFG[r.status||'chuagoi'];
    const hasSdt=r.sdt&&r.sdt.length>=9;
    html+=`
<div class="card" id="card-${r._id}">
  <div class="card-top">
    <span class="hang-badge" style="background:${hc.bg};color:${hc.tx}">${r.hang||'?'}</span>
    <div class="card-info">
      <div class="card-name">${hl(r.ten,q)}${r._new?' <span style="font-size:10px;color:#16a34a">🆕</span>':''}</div>
      ${r.dia_chi?`<div class="card-addr">${hl(r.dia_chi,q)}</div>`:''}
      <div class="chips">
        ${r.tinh?`<span class="chip tinh">📍${r.tinh}</span>`:''}
        ${r.huyen?`<span class="chip huyen">🏘${r.huyen}</span>`:''}
        ${r.trung?`<span class="chip" style="background:#fef9c3;color:#854d0e">⭐KH cũ</span>`:''}
      </div>
    </div>
  </div>
  <div class="card-actions">
    <div class="sdt-area">
      ${hasSdt
        ?`<a class="call-btn" href="tel:${r.sdt}">📞 ${r.sdt}</a>`
        :`<span class="no-sdt">Chưa có SĐT</span>`}
      <button class="edit-sdt-btn" onclick="showEdit('${r._id}')">✏️ Sửa</button>
    </div>
    <select class="status-select" onchange="changeStatus('${r._id}',this.value)">
      ${Object.entries(STATUS_CFG).map(([k,v])=>`<option value="${k}"${(r.status||'chuagoi')===k?' selected':''}>${v.label}</option>`).join('')}
    </select>
  </div>
  ${r.note?`
  <div class="status-bar">
    <div class="status-dot ${st.dot}"></div>
    <div class="status-text">📝 ${r.note}</div>
  </div>`:`
  <div class="status-bar">
    <div class="status-dot ${st.dot}"></div>
    <div class="status-text" style="color:#d1d5db;font-style:italic">Chưa có ghi chú</div>
  </div>`}
</div>`;
  });
  el.innerHTML=html;
}

function updateStats(){
  const counts={};
  Object.keys(STATUS_CFG).forEach(k=>counts[k]=0);
  DATA.forEach(r=>{ const s=r.status||'chuagoi'; if(counts[s]!==undefined)counts[s]++; });
  document.getElementById('sn-all').textContent=filtered.length;
  Object.keys(counts).forEach(k=>{
    const el=document.getElementById('sn-'+k);
    if(el)el.textContent=counts[k];
  });
  // Active state
  ['all',...Object.keys(STATUS_CFG)].forEach(k=>{
    const el=document.getElementById('st-'+k);
    if(el)el.classList.toggle('active',activeStatus===(k==='all'?'':k));
  });
  const co_sdt=DATA.filter(r=>r.sdt&&r.sdt.length>=9).length;
  document.getElementById('h-sub').textContent=
    `${filtered.length}/${DATA.length} NPP  |  SĐT: ${co_sdt}  |  Tiềm năng: ${counts.danhdau}`;
}

// ── STATUS CHANGE ─────────────────────────────────────────────────────────────
function changeStatus(id,val){
  const r=DATA.find(x=>x._id==id||x._id===id);
  if(r){ r.status=val; saveData(); applyFilters(); }
}

// ── EDIT MODAL ────────────────────────────────────────────────────────────────
function showEdit(id){
  editId=id;
  const r=DATA.find(x=>x._id==id||x._id===id);
  if(!r)return;
  document.getElementById('edit-title').textContent=`✏️ ${r.ten.length>25?r.ten.slice(0,25)+'...':r.ten}`;
  document.getElementById('e-sdt').value=r.sdt||'';
  document.getElementById('e-huyen').value=r.huyen||'';
  document.getElementById('e-status').value=r.status||'chuagoi';
  document.getElementById('e-note').value=r.note||'';
  document.getElementById('edit-modal').style.display='flex';
}
function closeEdit(){ document.getElementById('edit-modal').style.display='none'; editId=null; }
function saveEdit(){
  const r=DATA.find(x=>x._id==editId||x._id===editId);
  if(!r){closeEdit();return;}
  const newSdt=document.getElementById('e-sdt').value.trim();
  const newHuyen=document.getElementById('e-huyen').value.trim();
  r.sdt=newSdt;
  r.huyen=newHuyen;
  r.status=document.getElementById('e-status').value;
  r.note=document.getElementById('e-note').value.trim();
  // Cập nhật huyện map
  if(r.tinh&&newHuyen){
    if(!TINH_HUYEN[r.tinh])TINH_HUYEN[r.tinh]=new Set();
    TINH_HUYEN[r.tinh].add(newHuyen);
  }
  saveData();
  closeEdit();
  applyFilters();
}

// ── ADD MODAL ─────────────────────────────────────────────────────────────────
function showAdd(){ document.getElementById('add-modal').style.display='flex'; }
function closeAdd(){ document.getElementById('add-modal').style.display='none'; }
function addContact(){
  const ten=document.getElementById('a-ten').value.trim();
  if(!ten){alert('Vui lòng nhập tên!');return;}
  const tinh=document.getElementById('a-tinh').value;
  const huyen=document.getElementById('a-huyen').value.trim();
  const newR={
    _id:'new_'+Date.now(), _new:true,
    hang:document.getElementById('a-hang').value.trim()||'Mới',
    ten, sdt:document.getElementById('a-sdt').value.trim(),
    dia_chi:document.getElementById('a-dc').value.trim(),
    tinh, huyen, khu_vuc:'', trung:'',
    note:document.getElementById('a-note').value.trim(),
    status:'chuagoi',
  };
  DATA.unshift(newR);
  if(tinh&&huyen){
    if(!TINH_HUYEN[tinh])TINH_HUYEN[tinh]=new Set();
    TINH_HUYEN[tinh].add(huyen);
  }
  saveData();
  ['a-ten','a-sdt','a-dc','a-huyen','a-hang','a-note'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('a-tinh').value='';
  closeAdd();
  applyFilters();
}

// ── EXPORT ────────────────────────────────────────────────────────────────────
function showExport(){
  const rows=[['Hãng','Tên','Địa chỉ','Huyện','Tỉnh','SĐT','Trạng thái','KH cũ','Ghi chú']];
  DATA.forEach(r=>rows.push([
    r.hang,r.ten,r.dia_chi,r.huyen,r.tinh,r.sdt,
    STATUS_CFG[r.status||'chuagoi']?.label||'',r.trung,r.note
  ]));
  const csv=rows.map(r=>r.map(c=>`"${(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='AsiaStarCRM_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
loadData();
buildMaps();
applyFilters();
</script>
